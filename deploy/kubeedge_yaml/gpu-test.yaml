apiVersion: v1
kind: Pod
metadata:
  name: gpu-test
spec:
  nodeSelector:
    node-role.kubernetes.io/edge: ""  # 调度到边缘节点
  containers:
  - name: cuda-test
    image: nvidia/cuda:12.8.0-base-ubuntu24.04
    command: ["nvidia-smi", "-l", "10"]
    resources:
      limits:
        nvidia.com/gpu: 1
  restartPolicy: Never
