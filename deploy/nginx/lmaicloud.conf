# ============================================================
# LMAICloud Nginx 统一入口配置
# ============================================================
#
# 架构:
#   客户端 → Nginx (8080) ─┬─ /gpucloudapi/*  → FastAPI 后端 (115.190.180.194:8882)
#                            ├─ /ws/*           → FastAPI WebSocket
#                            ├─ /btg888/*       → 外部服务
#                            └─ /*              → Next.js 前端 (115.190.180.194:3000)
#
# 部署:
#   1. 将此文件复制到 /etc/nginx/conf.d/lmaicloud.conf
#   2. 修改 server_name 为实际域名或 IP
#   3. 修改 upstream 端口为实际服务端口
#   4. nginx -t && systemctl reload nginx
#
# 前端 .env 配置:
#   NEXT_PUBLIC_APP_URL=http://115.190.180.194:8080
#   NEXT_PUBLIC_API_URL=http://115.190.180.194:8080/gpucloudapi/api/v1
#   NEXT_PUBLIC_WS_URL=ws://115.190.180.194:8080/gpucloudapi
#
# 后端 .env 配置:
#   CORS_ORIGINS=http://115.190.180.194:8080
#   FRONTEND_URL=http://115.190.180.194:8080
# ============================================================

# WebSocket 连接升级映射
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- 上游服务 ----
upstream lmaibackend {
    server 115.190.180.194:8882;
    keepalive 32;
}

upstream lmaifrontend {
    server 115.190.180.194:3000;
    keepalive 16;
}

# ============================================================
# HTTP → HTTPS 重定向 (启用 SSL 时取消注释)
# ============================================================
# server {
#     listen 8080;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

# ============================================================
# 主服务
# ============================================================
server {
    listen 8080;
    # listen 443 ssl http2;                    # 启用 SSL 时取消注释
    server_name _;                              # 替换为实际域名或 IP

    # ---- SSL 证书 (启用 SSL 时取消注释) ----
    # ssl_certificate     /etc/nginx/ssl/your-domain.com.pem;
    # ssl_certificate_key /etc/nginx/ssl/your-domain.com.key;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    # ---- 通用设置 ----
    client_max_body_size 200m;                  # 文件上传大小限制
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ---- 后端 WebSocket 端点 ----
    # 路径:
    #   /ws/terminal/{id}                    - GPU 实例终端
    #   /ws/openclaw/terminal/{id}           - OpenClaw 实例终端
    #   /ws/openclaw/admin/terminal/{id}     - 管理端 OpenClaw 终端
    #   /ws/logs/{id}                        - 实例日志流
    #   /ws/status                           - 用户状态订阅
    #   /ws/instance/{id}/status             - 单实例状态订阅
    location /ws/ {
        proxy_pass http://lmaibackend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout  3600s;              # 终端长连接 1 小时
        proxy_send_timeout  3600s;
    }

    # ---- 后端 API ----
    # 包含:
    #   /api/v1/*                            - 所有业务 API
    #   /api/v1/admin/*                      - 管理后台 API
    #   /api/v1/admin/pods/ws/{ns}/{name}/exec - 管理端 Pod exec WebSocket
    # location /api/ {
    #     proxy_pass http://lmaibackend;
    #     proxy_http_version 1.1;
    #     # 支持 admin pods exec WebSocket 升级
    #     proxy_set_header Upgrade    $http_upgrade;
    #     proxy_set_header Connection $connection_upgrade;
    #     proxy_read_timeout  3600s;
    #     proxy_send_timeout  3600s;
    #     proxy_buffering     off;                # 实时流响应 (SSE/日志)
    # }

    location /gpucloudapi/ {
            proxy_pass http://lmaibackend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering     off;                # 实时流响应 (SSE/日志)
    }
    location /btg888/ {
            proxy_pass http://8.130.135.47/btg888/;
    }


    # ---- 后端根路径 (健康检查) ----
    # FastAPI GET / → {"message": "Welcome to LMAICloud API"}
    # 可选: 用于负载均衡器健康探测
    # location = /health {
    #     proxy_pass http://backend/;
    # }

    # ---- 前端 Next.js ----
    # Next.js 内部路由:
    #   /_next/static/*   - 构建产物 (JS/CSS)
    #   /_next/image/*    - 图片优化
    #   /_next/data/*     - 页面数据
    location / {
        proxy_pass http://lmaifrontend;
        proxy_http_version 1.1;
        # Next.js HMR WebSocket (开发环境热更新)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ---- Next.js 静态资源缓存 ----
    location /_next/static/ {
        proxy_pass http://lmaifrontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ---- 错误页面 ----
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ---- 访问日志 ----
    access_log /var/log/nginx/lmaicloud_access.log;
    error_log  /var/log/nginx/lmaicloud_error.log;
}
